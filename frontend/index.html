<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RAG Doc Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 40px 16px;
    }

    h1 { font-size: 1.6rem; margin-bottom: 24px; color: #1a1a1a; }

    .layout {
      display: flex;
      gap: 20px;
      width: 100%;
      max-width: 900px;
      align-items: flex-start;
    }

    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .sidebar h2 { font-size: 0.85rem; color: #888; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em; }

    #doc-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }

    #doc-list li {
      font-size: 0.85rem;
      padding: 8px 10px;
      background: #eff6ff;
      border-radius: 8px;
      color: #1d4ed8;
      word-break: break-all;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #doc-list li::before { content: "📄"; font-size: 0.9rem; }

    #no-docs { font-size: 0.82rem; color: #aaa; }

    .main { flex: 1; display: flex; flex-direction: column; gap: 20px; }

    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card h2 { font-size: 1rem; color: #555; margin-bottom: 14px; }

    .upload-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    input[type="file"] {
      flex: 1;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.9rem;
    }

    button {
      padding: 10px 20px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      white-space: nowrap;
    }

    button:hover { background: #1d4ed8; }
    button:disabled { background: #93c5fd; cursor: not-allowed; }

    #upload-status {
      margin-top: 10px;
      font-size: 0.85rem;
      color: #16a34a;
      min-height: 18px;
    }

    #chat-box {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 200px;
      max-height: 400px;
      overflow-y: auto;
      margin-bottom: 16px;
      padding-right: 4px;
    }

    .message {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.9rem;
      line-height: 1.5;
      max-width: 90%;
    }

    .message.user {
      background: #2563eb;
      color: white;
      align-self: flex-end;
    }

    .message.bot {
      background: #f0f0f0;
      color: #1a1a1a;
      align-self: flex-start;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
    }

    input[type="text"]:focus { border-color: #2563eb; }
  </style>
</head>
<body>

  <h1>RAG Doc Chat</h1>

  <div class="layout">
    <!-- Sidebar: Document List -->
    <div class="sidebar">
      <h2>Document</h2>
      <ul id="doc-list">
        <li id="active-doc" style="list-style:none; background:none; color:#aaa; padding:0;">No document uploaded yet</li>
      </ul>
    </div>

    <div class="main">
      <!-- Upload Section -->
      <div class="card">
        <h2>Upload PDF</h2>
        <div class="upload-row">
          <input type="file" id="pdf-input" accept=".pdf" onchange="showSelectedFile()" />
          <button onclick="uploadPDF()">Upload</button>
        </div>
        <div id="selected-file" style="margin-top:8px; font-size:0.85rem; color:#555; min-height:18px;"></div>
        <div id="upload-status"></div>
      </div>

      <!-- Chat Section -->
      <div class="card">
        <h2>Ask a question</h2>
        <div id="chat-box"></div>
        <div class="input-row">
          <input type="text" id="question-input" placeholder="Type your question..." onkeydown="if(event.key==='Enter') sendQuestion()" />
          <button onclick="sendQuestion()">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API = "http://localhost:8000";
    const activeDoc = document.getElementById("active-doc");

    function setActiveDoc(name) {
      if (!name) {
        activeDoc.textContent = "No document uploaded yet";
        activeDoc.style.listStyle = "none";
        activeDoc.style.background = "none";
        activeDoc.style.color = "#aaa";
        return;
      }
      activeDoc.textContent = name;
      activeDoc.style.listStyle = "";
      activeDoc.style.background = "#eff6ff";
      activeDoc.style.color = "#1d4ed8";
      localStorage.setItem("activeDoc", name);
    }

    function showSelectedFile() {
      const file = document.getElementById("pdf-input").files[0];
      document.getElementById("selected-file").textContent = file ? `Selected: ${file.name}` : "";
    }

    async function uploadPDF() {
      const file = document.getElementById("pdf-input").files[0];
      const status = document.getElementById("upload-status");
      if (!file) {
        status.textContent = "Please select a PDF file.";
        status.style.color = "#dc2626";
        return;
      }

      status.textContent = "Uploading...";
      status.style.color = "#555";

      const formData = new FormData();
      formData.append("file", file);

      try {
        const res = await fetch(`${API}/upload`, { method: "POST", body: formData });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "Upload failed.");
        setActiveDoc(file.name);
        status.textContent = data.message;
        status.style.color = "#16a34a";
      } catch (err) {
        status.textContent = err.message || "Server not reachable. Is the backend running?";
        status.style.color = "#dc2626";
      }
    }

    async function sendQuestion() {
      const input = document.getElementById("question-input");
      const question = input.value.trim();
      if (!question) return;

      addMessage(question, "user");
      input.value = "";
      addMessage("...", "bot", "typing");

      try {
        const res = await fetch(`${API}/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question })
        });
        const data = await res.json();
        removeTyping();
        addMessage(res.ok ? data.answer : (data.detail || "Error from server."), "bot");
      } catch {
        removeTyping();
        addMessage("Server not reachable. Is the backend running?", "bot");
      }
    }

    function addMessage(text, role, id = "") {
      const box = document.getElementById("chat-box");
      const msg = document.createElement("div");
      msg.className = `message ${role}`;
      msg.textContent = text;
      if (id) msg.id = id;
      box.appendChild(msg);
      box.scrollTop = box.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById("typing");
      if (t) t.remove();
    }

    setActiveDoc(localStorage.getItem("activeDoc"));
  </script>
</body>
</html>
